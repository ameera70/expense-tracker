<div 
  class="card mb-3 p-3 shadow-sm"
  [class.border-danger]="isHighExpense()"
>
  <div class="d-flex justify-content-between align-items-center">
    
    <div>
      <h5>{{ expense.title }}</h5>

      <p class="mb-1">
        Category:
        <span 
          [style.color]="expense.category === 'Food' ? 'green' :
                         expense.category === 'Travel' ? 'blue' :
                         expense.category === 'Shopping' ? 'purple' :
                         'black'">
          {{ expense.category }}
        </span>
      </p>

      <p class="mb-0">
        Amount: ${{ expense.amount }}
      </p>
    </div>

    <button class="btn btn-danger" (click)="deleteExpense()">
      Delete
    </button>
  </div>
</div>
