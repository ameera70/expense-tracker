<h2 class="text-center mb-3">Add Expense</h2>

<div class="card p-3">

  <input
    class="form-control mb-2"
    placeholder="Title"
    [(ngModel)]="title"
  />

  <input
    class="form-control mb-2"
    type="number"
    placeholder="Amount"
    [(ngModel)]="amount"
  />

  <select class="form-control mb-3" [(ngModel)]="category">
    <option *ngFor="let c of expenseService.categories()">
      {{ c }}
    </option>
  </select>

  <button class="btn btn-primary" (click)="addExpense()">
    Add Expense
  </button>

</div>
